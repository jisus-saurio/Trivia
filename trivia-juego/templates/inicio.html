<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Party</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/inicio.css') }}">
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="screen">

    <h1 class="title" aria-label="Trivia Party">
      <span class="l1">T</span><span class="l2">r</span><span class="l3">i</span><span class="l4">v</span><span class="l5">i</span><span class="l6">a</span>
      <span class="space"></span>
      <span class="l7">P</span><span class="l8">a</span><span class="l9">r</span><span class="l10">t</span><span class="l11">y</span>
    </h1>

    <div class="otter-wrapper">
      <img src="{{ url_for('static', filename='imagenes/inicio.png') }}" alt="Nutria" class="otter" id="otter" />
    </div>

    <button class="play-btn" id="playBtn">
      jugar
      <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="2"/>
        <polygon points="10,8 16,12 10,16"/>
      </svg>
    </button>

  </div>

  <script src="{{ url_for('static', filename='js/inicio.js') }}"></script>
</body>
</html>
